<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimistic Terminal</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: transparent;
  font-family: 'Courier New', 'SF Mono', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.terminal {
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  height: 100vh;
  display: flex;
  flex-direction: column;
  border-left: 1px solid rgba(135, 184, 127, 0.3);
  border-right: 1px solid rgba(135, 184, 127, 0.3);
}

.header {
  background: rgba(20, 20, 20, 0.8);
  padding: 12px 20px;
  border-bottom: 1px solid rgba(135, 184, 127, 0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.title {
  color: #87b87f;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 1px;
}

.status {
  font-size: 11px;
  padding: 4px 10px;
  font-family: monospace;
}

.status-connected {
  color: #87b87f;
}

.status-disconnected {
  color: #ff5f57;
}

.status-connecting {
  color: #febc2e;
}

.output {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  background: transparent;
}

.line {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-all;
  color: #e0e0e0;
}

.input-area {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: rgba(20, 20, 20, 0.8);
  border-top: 1px solid rgba(135, 184, 127, 0.2);
  flex-shrink: 0;
}

.prompt {
  color: #87b87f;
  font-family: monospace;
  font-size: 13px;
  white-space: nowrap;
}

.input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #e0e0e0;
  font-family: monospace;
  font-size: 13px;
}

.input:disabled {
  opacity: 0.5;
}

.output::-webkit-scrollbar {
  width: 6px;
}

.output::-webkit-scrollbar-track {
  background: rgba(50, 50, 50, 0.3);
}

.output::-webkit-scrollbar-thumb {
  background: rgba(135, 184, 127, 0.4);
}

.output::-webkit-scrollbar-thumb:hover {
  background: rgba(135, 184, 127, 0.6);
}
</style>
</head>
<body>
<div class="terminal">
<div class="header">
<div class="title">OPTIMISTIC TERMINAL</div>
<div class="status status-connecting" id="status">starting</div>
</div>
<div class="output" id="output">
<div class="line" style="color:#87b87f">─────────────────────────────────────────</div>
<div class="line" style="color:#87b87f">    Optimistic OS Terminal</div>
<div class="line" style="color:#87b87f">─────────────────────────────────────────</div>
</div>
<div class="input-area">
<span class="prompt" id="prompt">user@optimistic:~$</span>
<input type="text" class="input" id="input" autofocus>
</div>
</div>

<script>
let ws=null,connected=false,currentDir='~',history=[],historyIndex=-1,username='user',hostname='optimistic',retries=0;
const outputEl=document.getElementById('output');
const inputEl=document.getElementById('input');
const promptEl=document.getElementById('prompt');
const statusEl=document.getElementById('status');

function stripAnsi(t){
  let r=t;
  r=r.replace(/\x1b\[[0-9;]*[a-zA-Z]/g,'');
  r=r.replace(/\x1b\([A-Z]/g,'');
  r=r.replace(/\x1b=[0-9]/g,'');
  r=r.replace(/\x1b\]0;[^\x07]*\x07/g,'');
  r=r.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g,'');
  return r;
}

function setStatus(s,t){
  statusEl.textContent=t;
  statusEl.className=`status status-${s}`;
  connected=s==='connected';
  inputEl.disabled=!connected;
  if(connected)inputEl.focus();
}

function updatePrompt(){
  const d=currentDir==='~'?'~':currentDir.split('/').pop();
  promptEl.textContent=`${username}@${hostname}:${d}$ `;
}

function appendOutput(t,i){
  const div=document.createElement('div');
  div.className='line';
  const clean=stripAnsi(t);
  if(i){
    div.innerHTML=`<span style="color:#87b87f">${promptEl.textContent}</span><span style="color:#e0e0e0">${escapeHtml(clean)}</span>`;
  }else{
    div.textContent=clean;
  }
  outputEl.appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
}

function escapeHtml(t){
  const div=document.createElement('div');
  div.textContent=t;
  return div.innerHTML;
}

function sendCommand(c){
  if(!c.trim())return;
  history.unshift(c);
  historyIndex=-1;
  appendOutput(c,true);
  if(c==='clear'){
    outputEl.innerHTML='';
    const welcome=document.createElement('div');
    welcome.className='line';
    welcome.style.color='#87b87f';
    welcome.textContent='─────────────────────────────────────────\n    Optimistic OS Terminal\n─────────────────────────────────────────';
    outputEl.appendChild(welcome);
    return;
  }
  if(c==='exit'){
    appendOutput('closing terminal...');
    setTimeout(()=>{if(ws)ws.close();window.close();},500);
    return;
  }
  if(ws&&ws.readyState===WebSocket.OPEN){
    ws.send(c);
  }else{
    appendOutput('not connected to server');
  }
}

function connect(){
  const p=window.location.protocol==='https:'?'wss:':'ws:';
  const url=`${p}//${window.location.host}`;
  setStatus('connecting','connecting');
  ws=new WebSocket(url);
  ws.onopen=()=>{
    setStatus('connected','connected');
    retries=0;
    appendOutput('terminal ready');
    ws.send('__cwd__');
  };
  ws.onmessage=(e)=>{
    try{
      const d=JSON.parse(e.data);
      if(d.type==='output'){
        appendOutput(d.data);
      }else if(d.type==='cwd'){
        const h=`/home/${username}`;
        if(d.data===h)currentDir='~';
        else if(d.data.startsWith(h))currentDir='~'+d.data.substring(h.length);
        else currentDir=d.data;
        updatePrompt();
      }
    }catch(e){
      if(e.data)appendOutput(e.data);
    }
  };
  ws.onerror=()=>setStatus('disconnected','error');
  ws.onclose=()=>{
    setStatus('disconnected','disconnected');
    appendOutput('connection lost');
    if(retries<5){
      retries++;
      appendOutput(`reconnecting in ${retries}s`);
      setTimeout(connect,retries*1000);
    }
  };
}

inputEl.addEventListener('keydown',(e)=>{
  if(e.key==='Enter'){
    const c=inputEl.value;
    inputEl.value='';
    sendCommand(c);
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(historyIndex<history.length-1){
      historyIndex++;
      inputEl.value=history[historyIndex];
    }
  }else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(historyIndex>0){
      historyIndex--;
      inputEl.value=history[historyIndex];
    }else if(historyIndex===0){
      historyIndex=-1;
      inputEl.value='';
    }
  }
});

document.body.addEventListener('click',()=>{
  if(!inputEl.disabled)inputEl.focus();
});

try{
  const s=JSON.parse(localStorage.getItem('optimistic.session')||'null');
  if(s&&s.name)username=s.name;
}catch(e){}

connect();
</script>
</body>
</html>
