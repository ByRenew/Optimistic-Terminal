<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimistic Terminal</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: transparent;
  font-family: 'Courier New', 'Fira Code', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.terminal-glass {
  background: rgba(10, 14, 10, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  height: 100vh;
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(135, 184, 127, 0.2);
  margin: 0;
  overflow: hidden;
}

.terminal-header {
  background: rgba(26, 30, 26, 0.7);
  backdrop-filter: blur(10px);
  padding: 12px 20px;
  border-bottom: 1px solid rgba(135, 184, 127, 0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.terminal-title {
  color: #87b87f;
  font-weight: bold;
  font-size: 13px;
  letter-spacing: 1px;
  font-family: monospace;
}

.terminal-status {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 4px;
  font-family: monospace;
}

.status-connected {
  color: #87b87f;
  background: rgba(135, 184, 127, 0.15);
}

.status-disconnected {
  color: #ff5f57;
  background: rgba(255, 95, 87, 0.15);
}

.status-connecting {
  color: #febc2e;
  background: rgba(254, 188, 46, 0.15);
}

.terminal-output {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  background: transparent;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.5;
}

.terminal-line {
  margin-bottom: 2px;
  white-space: pre-wrap;
  word-break: break-all;
  color: #e0e0e0;
}

.terminal-input-area {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: rgba(13, 18, 8, 0.8);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(135, 184, 127, 0.2);
  flex-shrink: 0;
}

.terminal-prompt {
  color: #87b87f;
  font-family: monospace;
  font-size: 13px;
  white-space: nowrap;
}

.terminal-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #b8d8b0;
  font-family: monospace;
  font-size: 13px;
}

.terminal-input:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.terminal-output::-webkit-scrollbar {
  width: 6px;
}

.terminal-output::-webkit-scrollbar-track {
  background: rgba(26, 30, 26, 0.5);
}

.terminal-output::-webkit-scrollbar-thumb {
  background: rgba(135, 184, 127, 0.3);
  border-radius: 3px;
}

.terminal-output::-webkit-scrollbar-thumb:hover {
  background: rgba(135, 184, 127, 0.5);
}
</style>
</head>
<body>
<div class="terminal-glass">
<div class="terminal-header">
<div class="terminal-title">⟫ OPTIMISTIC TERMINAL ⟪</div>
<div class="terminal-status status-connecting" id="status">connecting</div>
</div>
<div class="terminal-output" id="output">
<div class="terminal-line" style="color:#87b87f">─────────────────────────────────────────</div>
<div class="terminal-line" style="color:#87b87f">    Optimistic OS Terminal</div>
<div class="terminal-line" style="color:#87b87f">─────────────────────────────────────────</div>
<div class="terminal-line" style="color:#febc2e">Connecting to backend...</div>
</div>
<div class="terminal-input-area">
<span class="terminal-prompt" id="prompt">user@optimistic:~$</span>
<input type="text" class="terminal-input" id="input" autofocus>
</div>
</div>

<script>
let ws = null;
let connected = false;
let currentDir = '~';
let history = [];
let historyIndex = -1;
let username = 'user';
let hostname = 'optimistic';
let retries = 0;

const outputEl = document.getElementById('output');
const inputEl = document.getElementById('input');
const promptEl = document.getElementById('prompt');
const statusEl = document.getElementById('status');

function stripAnsi(text) {
  let result = text;
  result = result.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
  result = result.replace(/\x1b\([A-Z]/g, '');
  result = result.replace(/\x1b=[0-9]/g, '');
  result = result.replace(/\x1b\]0;[^\x07]*\x07/g, '');
  result = result.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
  return result;
}

function setStatus(status, text) {
  statusEl.textContent = text;
  statusEl.className = `terminal-status status-${status}`;
  connected = status === 'connected';
  inputEl.disabled = !connected;
  if (connected) inputEl.focus();
}

function updatePrompt() {
  const dir = currentDir === '~' ? '~' : currentDir.split('/').pop();
  promptEl.textContent = `${username}@${hostname}:${dir}$ `;
}

function appendOutput(text, isCommand = false) {
  const div = document.createElement('div');
  div.className = 'terminal-line';
  const cleanText = stripAnsi(text);
  if (isCommand) {
    div.innerHTML = `<span style="color:#87b87f">${promptEl.textContent}</span><span style="color:#b8d8b0">${escapeHtml(cleanText)}</span>`;
  } else {
    div.textContent = cleanText;
  }
  outputEl.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function sendCommand(cmd) {
  if (!cmd.trim()) return;
  
  history.unshift(cmd);
  historyIndex = -1;
  
  appendOutput(cmd, true);
  
  if (cmd === 'clear' || cmd === 'cls') {
    outputEl.innerHTML = '';
    const welcome = document.createElement('div');
    welcome.className = 'terminal-line';
    welcome.style.color = '#87b87f';
    welcome.textContent = '─────────────────────────────────────────\n    Optimistic OS Terminal\n─────────────────────────────────────────';
    outputEl.appendChild(welcome);
    return;
  }
  
  if (cmd === 'exit') {
    appendOutput('Closing terminal...');
    setTimeout(() => {
      if (ws) ws.close();
      window.close();
    }, 500);
    return;
  }
  
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(cmd);
  } else {
    appendOutput('Not connected to terminal server');
  }
}

function connectWebSocket() {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${window.location.host}`;
  
  setStatus('connecting', 'connecting');
  
  ws = new WebSocket(wsUrl);
  
  ws.onopen = () => {
    setStatus('connected', 'connected');
    retries = 0;
    appendOutput('Terminal ready');
    ws.send('__cwd__');
  };
  
  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'output') {
        appendOutput(data.data);
      } else if (data.type === 'cwd') {
        const home = `/home/${username}`;
        if (data.data === home) {
          currentDir = '~';
        } else if (data.data.startsWith(home)) {
          currentDir = '~' + data.data.substring(home.length);
        } else {
          currentDir = data.data;
        }
        updatePrompt();
      }
    } catch (e) {
      if (event.data) appendOutput(event.data);
    }
  };
  
  ws.onerror = () => {
    setStatus('disconnected', 'error');
    appendOutput('WebSocket error - check if server is running');
  };
  
  ws.onclose = () => {
    setStatus('disconnected', 'disconnected');
    appendOutput('Connection lost');
    
    if (retries < 5) {
      retries++;
      appendOutput(`Reconnecting in ${retries}s...`);
      setTimeout(connectWebSocket, retries * 1000);
    } else {
      appendOutput('Failed to reconnect. Please refresh the page.');
    }
  };
}

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const cmd = inputEl.value;
    inputEl.value = '';
    sendCommand(cmd);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex < history.length - 1) {
      historyIndex++;
      inputEl.value = history[historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      inputEl.value = history[historyIndex];
    } else if (historyIndex === 0) {
      historyIndex = -1;
      inputEl.value = '';
    }
  }
});

document.body.addEventListener('click', () => {
  if (!inputEl.disabled) inputEl.focus();
});

try {
  const session = JSON.parse(localStorage.getItem('optimistic.session') || 'null');
  if (session && session.name) username = session.name;
} catch(e) {}

connectWebSocket();
</script>
</body>
</html>
